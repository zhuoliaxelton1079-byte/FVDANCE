<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./contact-copy.js"></script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="true">
  <link href="https://fonts.googleapis.com/css2?family=Asap+Condensed:wght@600;700&family=Asap:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; font-family: "Asap", sans-serif; color: #2B3730; background: #FAF5EA; }
    h1, h2, h3, h4 { font-family: "Asap Condensed", sans-serif; margin: 0; }
    ::selection { background: #E7EEE7; }
    :root {
      --pine: #2E4F35; --pine-dark: #1F3A26; --gold: #C9982D; --gold-soft: #F7EED9; --red: #2F6D5A;
      --pine-soft: #E7EEE7; --ink: #2B3730; --muted: #63695F; --border: #E8DFC8; --page: #FAF5EA; --sunken: #F4EDDD;
    }
    a { color: var(--pine); }
    a:hover { color: var(--pine-dark); }
    /* Contact card — single panel, portrait beside the details */
    .fv-card { position:relative; max-width:760px; margin:44px auto 0; background:#fff;
      border:1px solid var(--border); border-radius:16px; padding:40px 44px; overflow:hidden;
      box-shadow:0 10px 30px rgba(43,55,48,0.07); }
    .fv-card::before { content:""; position:absolute; top:0; left:0; right:0; height:3px;
      background:linear-gradient(90deg,var(--pine),var(--gold)); }
    .fv-card-inner { display:grid; grid-template-columns:170px 1fr; gap:36px; align-items:center; text-align:left; }
    .fv-portrait { width:170px; height:170px; border-radius:50%; overflow:hidden;
      box-shadow:0 0 0 3px #fff, 0 0 0 4px rgba(201,152,45,0.45), 0 8px 20px rgba(43,55,48,0.16); }
    .fv-label { display:block; font-size:12px; font-weight:700; text-transform:uppercase;
      letter-spacing:0.05em; color:var(--muted); margin-bottom:8px; }
    .fv-cta { display:inline-flex; align-items:center; gap:10px; padding:13px 22px; border-radius:9px;
      background:var(--pine); color:#fff; text-decoration:none; font-size:16px; font-weight:600;
      transition:background .15s, transform .15s, box-shadow .15s; }
    .fv-cta:hover { background:var(--pine-dark); color:#fff; transform:translateY(-2px);
      box-shadow:0 8px 20px rgba(46,79,53,0.28); }
    .fv-rise { animation:fvRise .5s ease-out both; }
    @keyframes fvRise { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
    @media (prefers-reduced-motion: reduce) { .fv-rise { animation:none; } }
  </style>
</helmet>

<div style="background:var(--page);min-height:100vh;display:flex;flex-direction:column" data-screen-label="Contact">
  <dc-import name="SiteNav" active-page="contact" hint-size="100%,72px"></dc-import>

  <section style="padding:64px 24px 88px;background:var(--page);flex:1">
    <div style="max-width:960px;margin:0 auto;text-align:center">
      <img src="assets/pptx/image13.png" alt="" style="width:72px;display:block;margin:0 auto 12px;opacity:0.9">
      <span style="text-transform:uppercase;letter-spacing:0.06em;font-size:13px;font-weight:700;color:var(--red)">{{ copy.eyebrow }}</span>
      <h2 style="font-size:36px;margin:12px 0 16px">{{ copy.title }}</h2>
      <p style="max-width:64ch;margin:0 auto;font-size:18px;color:var(--ink);line-height:1.6">{{ copy.intro }}</p>
    </div>

    <!-- Contact person + the one way to reach them -->
    <div class="fv-card fv-rise">
      <div class="fv-card-inner">
        <div class="fv-portrait">
          <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="contact-person" shape="circle" fit="cover" src="media/cindy-avatar.jpg" placeholder="Photo" hint-size="170px,170px"></x-import>
        </div>
        <div>
          <h3 style="font-size:26px;color:var(--pine);margin:0 0 4px">{{ copy.contact.name }}</h3>
          <div style="font-size:13px;font-weight:600;color:var(--red);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:14px">{{ copy.contact.role }}</div>
          <p style="font-size:16px;color:var(--muted);line-height:1.6;margin:0 0 24px">{{ copy.contact.blurb }}</p>
          <span class="fv-label">{{ copy.emailLabel }}</span>
          <a href="mailto:{{ copy.email }}" class="fv-cta"><span style="font-size:18px">✉</span>{{ copy.email }}</a>
        </div>
      </div>
    </div>
  </section>

  <dc-import name="SiteFooter" hint-size="100%,120px"></dc-import>

  <style>
    @media (max-width: 720px) {
      .fv-card { padding: 32px 24px; margin-top: 36px; }
      .fv-card-inner { grid-template-columns: 1fr; justify-items: center; text-align: center; gap: 24px; }
    }
    @media (max-width: 420px) {
      .fv-cta { font-size: 15px; padding: 12px 18px; max-width: 100%; }
    }
  </style>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const fallback = {
      eyebrow: "Get In Touch",
      title: "Book Us for Your Event",
      intro: "We love performing at community festivals, school programs, cultural celebrations and private events across Fox Valley and beyond. We also welcome sponsorship inquiries from local businesses who want to support Chinese cultural arts in our community.",
      contact: {
        name: "Mei Chen",
        role: "Bookings & Sponsorship",
        blurb: "Reach out any time — Mei handles event bookings and sponsorship questions and will get back to you within a couple of days."
      },
      emailLabel: "Email us",
      email: "fvchinesedance@gmail.com"
    };
    return {
      copy: window.CONTACT_COPY || fallback,
    };
  }
}

</script>
</body>
</html>
