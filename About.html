<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./about-copy.js?v=20260718c"></script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="true">
  <link href="https://fonts.googleapis.com/css2?family=Asap+Condensed:wght@600;700&family=Asap:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; font-family: "Asap", sans-serif; color: #2B3730; background: #FAF5EA; }
    h1, h2, h3, h4 { font-family: "Asap Condensed", sans-serif; margin: 0; }
    ::selection { background: #E7EEE7; }
    :root {
      --pine: #2E4F35; --pine-dark: #1F3A26; --gold: #C9982D; --gold-soft: #F7EED9; --red: #2F6D5A;
      --pine-soft: #E7EEE7; --ink: #2B3730; --muted: #63695F; --border: #E8DFC8; --page: #FAF5EA; --sunken: #F4EDDD;
    }
    a { color: var(--pine); }
    a:hover { color: var(--pine-dark); }
  </style>
</helmet>

<div style="background:var(--page)" data-screen-label="About">
  <dc-import name="SiteNav" active-page="about" hint-size="100%,72px"></dc-import>

  <section style="padding:64px 24px 48px;background:var(--page)">
    <div style="max-width:70ch;margin:0 auto;text-align:center">
      <img src="assets/pptx/image13.png" alt="" style="width:76px;display:block;margin:0 auto 12px;opacity:0.9">
      <span style="text-transform:uppercase;letter-spacing:0.06em;font-size:13px;font-weight:700;color:var(--red)">{{ copy.eyebrow }}</span>
      <h2 style="font-size:36px;margin:12px 0 20px">{{ copy.title }}</h2>
      <p style="font-size:18px;color:var(--ink);line-height:1.6;margin:0">{{ copy.intro1 }}</p>
    </div>
  </section>

  <section style="padding:16px 24px 64px;background:var(--page)">
    <div style="max-width:1200px;margin:0 auto">
      <div style="max-width:70ch;margin:0 auto 40px;text-align:center">
        <h3 style="font-size:28px;margin:0 0 8px">{{ copy.highlightsTitle }}</h3>
        <p style="font-size:16px;color:var(--muted);line-height:1.6;margin:0">{{ copy.highlightsIntro }}</p>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px" class="fv-highlight-grid">
        <sc-for list="{{ highlights }}" as="dancer" hint-placeholder-count="3">
          <div style="background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,0.06)">
            <div style="height:340px">
              <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="{{ dancer.id }}" shape="rect" placeholder="Drop a performance photo" hint-size="100%,340px"></x-import>
            </div>
            <div style="padding:20px 24px 24px">
              <h4 style="font-family:'Asap Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--pine);margin:0 0 4px">{{ dancer.name }}</h4>
              <div style="font-size:13px;font-weight:600;color:var(--red);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px">{{ dancer.role }}</div>
              <div style="font-size:14px;color:var(--ink);line-height:1.5">{{ dancer.body }}</div>
            </div>
          </div>
        </sc-for>
      </div>
    </div>
  </section>

  <dc-import name="SiteFooter" hint-size="100%,120px"></dc-import>

  <style>
    @media (max-width: 860px) {
      .fv-highlight-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const fallback = {
      eyebrow: "Our Story",
      title: "Two Decades of Dance in the Fox Valley",
      intro1: "Founded in 2006, the Fox Valley Chinese Dance Group began as a small circle of neighbors who wanted to keep Chinese dance traditions alive for their families and share them with the wider community. Today we are a volunteer-led group of dancers of all ages, rehearsing weekly and performing throughout Northeast Wisconsin.",
      highlightsTitle: "Dancer Highlights",
      highlightsIntro: "A few of the dancers who bring our performances to life.",
      highlights: [
        {
          id: "dancer-1",
          name: "Mei Chen",
          role: "Group Dance Leader",
          body: "Leads the group's classical and folk dance performances."
        },
        {
          id: "dancer-2",
          name: "",
          role: "Solo Dancer",
          body: "Performs solo pieces and assists in choreography."
        },
        {
          id: "dancer-3",
          name: "Cindy Kong",
          role: "Group Leader",
          body: "Coordinates dance rehearsals and community performance bookings."
        }
      ]
    };
    const copy = window.ABOUT_COPY || fallback;
    return {
      copy,
      highlights: copy.highlights || fallback.highlights,
    };
  }
}

</script>
</body>
</html>
