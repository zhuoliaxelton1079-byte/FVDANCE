<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./culture-copy.js?v=20260719a"></script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="true">
  <link href="https://fonts.googleapis.com/css2?family=Asap+Condensed:wght@600;700&family=Asap:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; font-family: "Asap", sans-serif; color: #2B3730; background: #FAF5EA; }
    h1, h2, h3, h4 { font-family: "Asap Condensed", sans-serif; margin: 0; }
    ::selection { background: #E7EEE7; }
    :root {
      --pine: #2E4F35; --pine-dark: #1F3A26; --gold: #C9982D; --gold-soft: #F7EED9; --red: #2F6D5A;
      --pine-soft: #E7EEE7; --ink: #2B3730; --muted: #63695F; --border: #E8DFC8; --page: #FAF5EA; --sunken: #F4EDDD;
    }
    a { color: var(--pine); }
    a:hover { color: var(--pine-dark); }
  </style>
</helmet>

<div style="background:var(--page);min-height:100vh;display:flex;flex-direction:column" data-screen-label="Culture">
  <dc-import name="SiteNav" active-page="culture" hint-size="100%,72px"></dc-import>

  <section style="padding:64px 24px;flex:1">
    <div style="max-width:1200px;margin:0 auto">
      <div style="max-width:70ch;margin:0 auto 40px;text-align:center">
        <img src="assets/pptx/image13.png" alt="" style="width:76px;display:block;margin:0 auto 12px;opacity:0.9">
        <span style="text-transform:uppercase;letter-spacing:0.06em;font-size:13px;font-weight:700;color:var(--red)">{{ copy.eyebrow }}</span>
        <h2 style="font-size:36px;margin:12px 0 16px">{{ copy.title }}</h2>
        <p style="font-size:18px;color:var(--ink);line-height:1.6;margin:0">{{ copy.intro }}</p>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:40px" class="fv-repertoire-grid">
        <sc-for list="{{ copy.cards }}" as="item" hint-placeholder-count="3">
          <div style="background:#fff;border:1px solid var(--border);border-radius:6px;padding:24px;box-shadow:0 1px 2px rgba(0,0,0,0.06)">
            <div style="text-transform:uppercase;letter-spacing:0.06em;font-size:11px;font-weight:700;color:var(--red);margin-bottom:8px">{{ item.tag }}</div>
            <h4 style="font-family:'Asap',sans-serif;font-size:17px;font-weight:700;color:var(--pine);margin:0 0 8px">{{ item.title }}</h4>
            <div style="font-size:14px;color:var(--ink);line-height:1.5">{{ item.body }}</div>
          </div>
        </sc-for>
      </div>
      <div style="background:var(--pine-soft);border-left:4px solid var(--gold);border-radius:0 6px 6px 0;padding:20px 24px">
        <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--pine);margin-bottom:4px">{{ copy.whyTitle }}</div>
        <div style="font-size:15px;color:var(--ink);line-height:1.6">{{ copy.whyBody }}</div>
      </div>
    </div>
  </section>

  <section style="padding:64px 24px 72px;background:var(--pine-dark)">
    <div style="max-width:1100px;margin:0 auto">
      <div style="max-width:70ch;margin:0 auto 36px;text-align:center">
        <h3 style="font-size:28px;color:#FAF5EA;margin:0 0 14px">{{ copy.historyTitle }}</h3>
        <p style="font-size:16px;color:#D8DFD2;line-height:1.7;margin:0">{{ copy.historyIntro }}</p>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:36px" class="fv-history-grid">
        <sc-for list="{{ danceTypes }}" as="item" hint-placeholder-count="4">
          <div style="background:rgba(250,245,234,0.06);border:1px solid rgba(250,245,234,0.18);border-radius:8px;padding:22px">
            <div style="text-transform:uppercase;letter-spacing:0.08em;font-size:13px;font-weight:700;color:var(--gold);margin-bottom:8px">{{ item.name }}</div>
            <div style="font-size:14px;color:#E9E4D4;line-height:1.55">{{ item.body }}</div>
          </div>
        </sc-for>
      </div>
      <p style="max-width:70ch;margin:0 auto;text-align:center;font-size:15px;color:#D8DFD2;line-height:1.7">{{ copy.historyOutro }}</p>
    </div>
  </section>

  <dc-import name="SiteFooter" hint-size="100%,120px"></dc-import>

  <style>
    @media (max-width: 960px) {
      .fv-history-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
    @media (max-width: 860px) {
      .fv-repertoire-grid { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 560px) {
      .fv-history-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const fallback = {
      eyebrow: "Our Repertoire",
      title: "Promoting Chinese Culture Through Dance",
      intro: "Every performance is a small window into China's regions, seasons and stories, brought to life through movement, costume and music.",
      cards: [
        {
          tag: "Style",
          title: "Classical Dance",
          body: "Graceful, flowing forms rooted in centuries of Chinese classical technique: ribbon, fan and silk movements."
        },
        {
          tag: "Style",
          title: "Ethnic Dance",
          body: "Vibrant folk traditions from across China's regions and ethnic minority groups, each with its own rhythm and story."
        },
        {
          tag: "Format",
          title: "Group and Solo",
          body: "Large ensemble showcases alongside featured solo pieces that highlight individual dancers' artistry."
        }
      ],
      whyTitle: "Why It Matters",
      whyBody: "Dance carries language, history and values across generations. By performing publicly in the Fox Valley, we help keep Chinese cultural traditions visible, accessible and alive for neighbors of every background.",
      historyTitle: "Chinese Dance History",
      historyIntro: "Chinese dance dates back nearly 5,000 years. As in most cultures, Chinese dance is closely linked to and reflective of life experiences and concerns. Thus the dances can be divided into four kinds:",
      danceTypes: [
        { name: "Ceremonial", body: "For praying to the gods for bountiful harvests." },
        { name: "Dramatic", body: "For reporting and commemorating historical events." },
        { name: "Martial", body: "For demonstrating fighting techniques." },
        { name: "Agricultural", body: "For celebrating nature and work." }
      ],
      historyOutro: "Like the United States, China is a nation of many different nationalities. Each has its own history, language and tradition, and maintains its own distinct customs and style of dress. The Han makes up the majority of China's population. Some of the larger minority groups are the Mongols, the Zhuang, the Dai, and the Miao."
    };
    const copy = window.CULTURE_COPY || fallback;
    return {
      copy,
      danceTypes: copy.danceTypes || fallback.danceTypes,
    };
  }
}

</script>
</body>
</html>
