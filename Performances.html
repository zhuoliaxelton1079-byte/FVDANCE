<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./performances-copy.js"></script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="true">
  <link href="https://fonts.googleapis.com/css2?family=Asap+Condensed:wght@600;700&family=Asap:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; font-family: "Asap", sans-serif; color: #2B3730; background: #FAF5EA; }
    h1, h2, h3, h4 { font-family: "Asap Condensed", sans-serif; margin: 0; }
    ::selection { background: #E7EEE7; }
    :root {
      --pine: #2E4F35; --pine-dark: #1F3A26; --gold: #C9982D; --gold-soft: #F7EED9; --red: #2F6D5A;
      --pine-soft: #E7EEE7; --ink: #2B3730; --muted: #63695F; --border: #E8DFC8; --page: #FAF5EA; --sunken: #F4EDDD;
    }
    a { color: var(--pine); }
    a:hover { color: var(--pine-dark); }
  </style>
</helmet>

<div style="background:var(--page)" data-screen-label="Performances">
  <dc-import name="SiteNav" active-page="performances" hint-size="100%,72px"></dc-import>

  <section style="padding:64px 24px;background:var(--page)">
    <div style="max-width:1200px;margin:0 auto">
      <div style="max-width:70ch;margin:0 auto 32px;text-align:center">
        <img src="assets/pptx/image13.png" alt="" style="width:76px;display:block;margin:0 auto 12px;opacity:0.9">
        <span style="text-transform:uppercase;letter-spacing:0.06em;font-size:13px;font-weight:700;color:var(--red)">{{ copy.eyebrow }}</span>
        <h2 style="font-size:36px;margin:12px 0 16px">{{ copy.title }}</h2>
        <p style="font-size:18px;color:var(--ink);line-height:1.6;margin:0">{{ copy.intro }}</p>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:24px" class="fv-gallery-grid">
        <sc-for list="{{ galleryPhotos }}" as="photo" hint-placeholder-count="6">
          <div>
            <div style="border-radius:8px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,0.08);height:220px">
              <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="{{ photo.id }}" shape="rect" placeholder="{{ photo.placeholder }}" hint-size="100%,220px"></x-import>
            </div>
            <div style="margin-top:8px;font-size:14px;color:var(--muted)">{{ photo.caption }}</div>
          </div>
        </sc-for>
      </div>

      <h3 style="font-size:22px;margin:48px 0 20px">{{ copy.clipsTitle }}</h3>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:24px" class="fv-video-grid">
        <sc-for list="{{ videoClips }}" as="clip" hint-placeholder-count="2">
          <div>
            <sc-if value="{{ clip.hasVideo }}">
              <div style="border-radius:8px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,0.08);aspect-ratio:16/9;background:#000">
                <video src="{{ clip.video }}" controls preload="metadata" playsinline style="width:100%;height:100%;object-fit:cover;background:#000;display:block"></video>
              </div>
              <div style="margin-top:8px;font-size:15px;font-weight:700;color:var(--ink)">{{ clip.caption }}</div>
            </sc-if>
            <sc-if value="{{ clip.noVideo }}">
              <div style="position:relative;border-radius:8px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,0.08);aspect-ratio:16/9">
                <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="{{ clip.id }}" shape="rect" placeholder="{{ clip.placeholder }}" hint-size="100%,280px"></x-import>
                <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">
                  <span style="width:64px;height:64px;border-radius:50%;background:rgba(27,67,50,0.85);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px">▶</span>
                </div>
                <div style="position:absolute;left:0;right:0;bottom:0;padding:12px 16px;background:linear-gradient(transparent,rgba(0,0,0,0.55));color:#fff;font-size:15px;font-weight:700;pointer-events:none">{{ clip.caption }}</div>
              </div>
            </sc-if>
          </div>
        </sc-for>
      </div>
    </div>
  </section>

  <dc-import name="SiteFooter" hint-size="100%,120px"></dc-import>

  <style>
    @media (max-width: 860px) {
      .fv-gallery-grid { grid-template-columns: repeat(2,1fr) !important; }
      .fv-video-grid, .fv-repertoire-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const fallback = {
      eyebrow: "On Stage",
      title: "Past Performances",
      intro: "Highlights from our stages across Wisconsin, including the Fox Valley Performing Arts Center and the Oshkosh Grand Opera House, plus community festivals and events.",
      clipsTitle: "Performance Clips",
      galleryPhotos: [
        { id: "gallery-1", caption: "Fox Valley Performing Arts Center, 2023", placeholder: "Drop a performance photo" },
        { id: "gallery-2", caption: "Oshkosh Grand Opera House, 2022", placeholder: "Drop a performance photo" },
        { id: "gallery-3", caption: "Lunar New Year Festival", placeholder: "Drop a performance photo" },
        { id: "gallery-4", caption: "Community Cultural Fair", placeholder: "Drop a performance photo" },
        { id: "gallery-5", caption: "Solo fan dance showcase", placeholder: "Drop a performance photo" },
        { id: "gallery-6", caption: "Youth ensemble rehearsal", placeholder: "Drop a performance photo" }
      ],
      videoClips: [
        { id: "video-1", caption: "Classical Ribbon Dance - Fox Valley PAC", placeholder: "Drop a video thumbnail", video: "dance-clip-web.mp4", hasVideo: true, noVideo: false },
        { id: "video-2", caption: "Ethnic Folk Showcase - Oshkosh Grand Opera House", placeholder: "Drop a video thumbnail", video: "", hasVideo: false, noVideo: true }
      ]
    };
    const copy = window.PERFORMANCES_COPY || fallback;
    return {
      copy,
      galleryPhotos: copy.galleryPhotos,
      videoClips: copy.videoClips,
    };
  }
}

</script>
</body>
</html>
