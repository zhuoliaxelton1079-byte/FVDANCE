<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./home-copy.js"></script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="true">
  <link href="https://fonts.googleapis.com/css2?family=Asap+Condensed:wght@600;700&family=Asap:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; font-family: "Asap", sans-serif; color: #2B3730; background: #FAF5EA; }
    h1, h2, h3, h4 { font-family: "Asap Condensed", sans-serif; margin: 0; }
    ::selection { background: #E7EEE7; }
    :root {
      --pine: #2E4F35; --pine-dark: #1F3A26; --gold: #C9982D; --gold-soft: #F7EED9; --red: #2F6D5A;
      --pine-soft: #E7EEE7; --ink: #2B3730; --muted: #63695F; --border: #E8DFC8; --page: #FAF5EA; --sunken: #F4EDDD;
    }
    a { color: var(--pine); }
    a:hover { color: var(--pine-dark); }
  </style>
</helmet>

<div style="background:var(--page)" data-screen-label="Home">
  <dc-import name="SiteNav" active-page="home" hint-size="100%,72px"></dc-import>

  <section id="top" style="background:#F4EDDD;position:relative;overflow:hidden">
    <img src="assets/pptx/image4.png" alt="" style="position:absolute;top:0;right:1%;height:200px;opacity:0.95;pointer-events:none;z-index:1">
    <img src="assets/pptx/image3.png" alt="" style="position:absolute;bottom:16px;left:-50px;width:400px;opacity:0.3;pointer-events:none">
    <div style="max-width:1200px;margin:0 auto;padding:64px 24px 56px;display:grid;grid-template-columns:1.1fr 0.9fr;gap:64px;align-items:center;position:relative" class="fv-hero-grid">
      <div>
        <span style="display:inline-flex;align-items:center;padding:4px 12px;border-radius:999px;background:var(--red);color:#fff;font-size:13px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:20px">{{ copy.badge }}</span>
        <h1 style="color:var(--pine-dark);font-size:64px;line-height:1.1;margin:0 0 16px">{{ copy.heroTitle }}</h1>
        <div style="width:64px;height:4px;background:var(--gold);border-radius:2px;margin:0 0 20px"></div>
        <p style="font-size:18px;color:var(--ink);line-height:1.6;max-width:52ch;margin:0 0 32px">{{ copy.heroBody }}</p>
        <div style="display:flex;gap:16px;flex-wrap:wrap">
          <a href="{{ copy.heroCtaHref }}" style="text-decoration:none;display:inline-flex;align-items:center;padding:13px 24px;border-radius:5px;border:1px solid var(--pine);color:var(--pine);font-weight:700;font-size:16px">{{ copy.heroCtaLabel }}</a>
        </div>
      </div>
      <div style="width:98%;height:370px;margin-top:56px;margin-left:-14%;border-radius:8px;overflow:hidden;box-shadow:0 12px 32px rgba(0,0,0,0.25)">
        <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="hero-photo" shape="rect" src="media/home1.jpg" placeholder="Drop a hero performance photo" hint-size="100%,330px"></x-import>
      </div>
    </div>
  </section>

  <section style="padding:64px 24px;background:var(--page)">
    <div style="max-width:1200px;margin:0 auto">
      <div style="max-width:70ch;margin:0 auto 48px;text-align:center">
        <img src="assets/pptx/image13.png" alt="" style="width:76px;display:block;margin:0 auto 12px;opacity:0.9">
        <span style="text-transform:uppercase;letter-spacing:0.06em;font-size:13px;font-weight:700;color:var(--red)">{{ copy.sectionEyebrow }}</span>
        <h2 style="font-size:36px;margin:12px 0 0">{{ copy.sectionTitle }}</h2>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px" class="fv-teaser-grid">
        <sc-for list="{{ copy.cards }}" as="card" hint-placeholder-count="3">
          <a href="{{ card.href }}" style="text-decoration:none;display:block;background:#fff;border:1px solid var(--border);border-radius:8px;padding:28px;box-shadow:0 1px 2px rgba(0,0,0,0.06)">
            <h4 style="font-size:22px;color:var(--pine);margin:0 0 10px">{{ card.title }}</h4>
            <div style="font-size:15px;color:var(--ink);line-height:1.5;margin-bottom:12px">{{ card.body }}</div>
            <span style="font-size:14px;font-weight:700;color:var(--red)">{{ card.cta }}</span>
          </a>
        </sc-for>
      </div>
    </div>
  </section>

  <dc-import name="SiteFooter" hint-size="100%,120px"></dc-import>

  <style>
    @media (max-width: 860px) {
      .fv-hero-grid, .fv-teaser-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const fallback = {
      badge: "Est. 2006 | Fox Valley, Wisconsin",
      heroTitle: "Fox Valley Chinese Dance Group",
      heroBody: "Sharing the beauty, discipline and joy of Chinese dance with our Wisconsin community through classical and ethnic performances, festivals, and public events since 2006.",
      heroCtaLabel: "Watch Performances",
      heroCtaHref: "Performances.html",
      sectionEyebrow: "Explore",
      sectionTitle: "Get to Know Us",
      cards: [
        {
          href: "About.html",
          title: "Our Story",
          body: "Founded in 2006, a volunteer-led troupe sharing Chinese dance across the Fox Valley.",
          cta: "Meet the group ->"
        },
        {
          href: "Performances.html",
          title: "Performances",
          body: "Photos and clips from the Fox Valley PAC, Oshkosh Grand Opera House, and community festivals.",
          cta: "See the gallery ->"
        },
        {
          href: "Contact.html",
          title: "Book Us",
          body: "Bring Chinese dance to your festival, school, or private event. Sponsorships welcome too.",
          cta: "Get in touch ->"
        }
      ]
    };
    return { copy: window.HOME_COPY || fallback };
  }
}
</script>
</body>
</html>
