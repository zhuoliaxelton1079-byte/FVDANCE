<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="true">
  <link href="https://fonts.googleapis.com/css2?family=Asap+Condensed:wght@600;700&family=Asap:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; font-family: "Asap", sans-serif; color: #2B3730; background: #FAF5EA; }
    h1, h2, h3, h4 { font-family: "Asap Condensed", sans-serif; margin: 0; }
    ::selection { background: #E7EEE7; }
    :root {
      --pine: #2E4F35; --pine-dark: #1F3A26; --gold: #C9982D; --gold-soft: #F7EED9; --red: #2F6D5A;
      --pine-soft: #E7EEE7; --ink: #2B3730; --muted: #63695F; --border: #E8DFC8; --page: #FAF5EA; --sunken: #F4EDDD;
    }
    a { color: var(--pine); }
    a:hover { color: var(--pine-dark); }
  </style>
</helmet>

<div style="background:var(--page)" data-screen-label="Testimonials">
  <dc-import name="SiteNav" active-page="testimonials" hint-size="100%,72px"></dc-import>

  <section style="padding:64px 24px;background:var(--pine-soft)">
    <div style="max-width:1200px;margin:0 auto">
      <div style="max-width:70ch;margin:0 auto 48px;text-align:center">
        <img src="assets/pptx/image13.png" alt="" style="width:76px;display:block;margin:0 auto 12px;opacity:0.9">
        <span style="text-transform:uppercase;letter-spacing:0.06em;font-size:13px;font-weight:700;color:var(--red)">Kind Words</span>
        <h2 style="font-size:36px;margin:12px 0 0">What Event Hosts Say</h2>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px" class="fv-testimonial-grid">
        <sc-for list="{{ testimonials }}" as="t" hint-placeholder-count="3">
          <div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:24px;box-shadow:0 1px 2px rgba(0,0,0,0.06)">
            <p style="font-family:'Asap Condensed',sans-serif;font-size:19px;color:var(--pine);line-height:1.45;margin:0 0 16px;font-style:italic">"{{ t.quote }}"</p>
            <div style="font-size:15px;font-weight:700;color:var(--ink)">{{ t.name }}</div>
            <div style="font-size:13px;color:var(--muted)">{{ t.role }}</div>
          </div>
        </sc-for>
      </div>
    </div>
  </section>

  <dc-import name="SiteFooter" hint-size="100%,120px"></dc-import>

  <style>
    @media (max-width: 860px) {
      .fv-testimonial-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      testimonials: [
        { quote: "The performance was the highlight of our festival — colorful, moving, and beautifully rehearsed.", name: "Community Festival Organizer", role: "Appleton, WI" },
        { quote: "Professional, warm, and a joy to work with from first email to final bow.", name: "Theatre Program Director", role: "Oshkosh Grand Opera House" },
        { quote: "Our students still talk about the dancers who visited our school assembly.", name: "Elementary School Principal", role: "Fox Valley area" },
      ],
    };
  }
}

</script>
</body>
</html>
